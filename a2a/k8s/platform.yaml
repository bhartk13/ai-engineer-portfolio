# ── A2A Platform Kubernetes Manifests ──────────────────────────────────────────

---
# Namespace
apiVersion: v1
kind: Namespace
metadata:
  name: a2a-platform
  labels:
    app.kubernetes.io/name: a2a-platform

---
# ConfigMap
apiVersion: v1
kind: ConfigMap
metadata:
  name: a2a-platform-config
  namespace: a2a-platform
data:
  NODE_ENV: "production"
  LOG_LEVEL: "info"
  REDIS_HOST: "redis-service"
  REDIS_PORT: "6379"

---
# Secret (values injected by CI/CD)
apiVersion: v1
kind: Secret
metadata:
  name: a2a-platform-secrets
  namespace: a2a-platform
type: Opaque
stringData:
  ANTHROPIC_API_KEY: "REPLACE_WITH_ACTUAL_KEY"
  IBM_API_KEY: "REPLACE_WITH_ACTUAL_KEY"
  DB_PASSWORD: "REPLACE_WITH_ACTUAL_PASSWORD"

---
# Platform API Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: platform-api
  namespace: a2a-platform
  labels:
    app: platform-api
    component: orchestrator
spec:
  replicas: 2
  selector:
    matchLabels:
      app: platform-api
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: platform-api
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/metrics"
        prometheus.io/port: "3000"
    spec:
      serviceAccountName: a2a-platform-sa
      containers:
        - name: platform-api
          image: us.icr.io/a2a-platform/platform-api:latest
          ports:
            - containerPort: 3000
              name: http
          envFrom:
            - configMapRef:
                name: a2a-platform-config
          env:
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: a2a-platform-secrets
                  key: ANTHROPIC_API_KEY
            - name: IBM_API_KEY
              valueFrom:
                secretKeyRef:
                  name: a2a-platform-secrets
                  key: IBM_API_KEY
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 15
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            readOnlyRootFilesystem: false

---
apiVersion: v1
kind: Service
metadata:
  name: platform-api-service
  namespace: a2a-platform
spec:
  selector:
    app: platform-api
  ports:
    - port: 80
      targetPort: 3000
      name: http
  type: ClusterIP

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: platform-api-hpa
  namespace: a2a-platform
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: platform-api
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80

---
# Research Agent Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: research-agent
  namespace: a2a-platform
  labels:
    app: research-agent
    a2a-agent: "true"
    framework: adk
spec:
  replicas: 2
  selector:
    matchLabels:
      app: research-agent
  template:
    metadata:
      labels:
        app: research-agent
        a2a-agent: "true"
    spec:
      containers:
        - name: research-agent
          image: us.icr.io/a2a-platform/research-agent:latest
          ports:
            - containerPort: 8081
          env:
            - name: AGENT_PORT
              value: "8081"
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: a2a-platform-secrets
                  key: ANTHROPIC_API_KEY
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /health
              port: 8081
            initialDelaySeconds: 10
            periodSeconds: 5

---
apiVersion: v1
kind: Service
metadata:
  name: research-agent-service
  namespace: a2a-platform
  annotations:
    a2a/discovery: "true"
    a2a/agent-id: "research-agent-001"
spec:
  selector:
    app: research-agent
  ports:
    - port: 80
      targetPort: 8081
  type: ClusterIP

---
# Ingress
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: a2a-platform-ingress
  namespace: a2a-platform
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - api.a2a-platform.example.com
        - agents.a2a-platform.example.com
      secretName: a2a-platform-tls
  rules:
    - host: api.a2a-platform.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: platform-api-service
                port:
                  number: 80
    - host: agents.a2a-platform.example.com
      http:
        paths:
          - path: /research
            pathType: Prefix
            backend:
              service:
                name: research-agent-service
                port:
                  number: 80

---
# ServiceAccount
apiVersion: v1
kind: ServiceAccount
metadata:
  name: a2a-platform-sa
  namespace: a2a-platform

---
# Redis for caching/queuing
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: a2a-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - containerPort: 6379
          command: ["redis-server", "--appendonly", "yes"]
          resources:
            limits:
              cpu: 200m
              memory: 256Mi
          volumeMounts:
            - mountPath: /data
              name: redis-data
      volumes:
        - name: redis-data
          persistentVolumeClaim:
            claimName: redis-pvc

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: redis-pvc
  namespace: a2a-platform
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi

---
apiVersion: v1
kind: Service
metadata:
  name: redis-service
  namespace: a2a-platform
spec:
  selector:
    app: redis
  ports:
    - port: 6379
      targetPort: 6379
