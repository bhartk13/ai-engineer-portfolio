events { worker_connections 1024; }
http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;
  upstream platform_api { server platform-api:3000; }
  upstream research_agent { server research-agent:8081; }
  upstream analysis_agent { server data-analysis-agent:8082; }
  upstream report_agent { server report-agent:8083; }

  server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    location /api/ { proxy_pass http://platform_api; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; }
    location /health { proxy_pass http://platform_api/health; }
    location /agents/research/ { rewrite ^/agents/research(.*)$ $1 break; proxy_pass http://research_agent; }
    location /agents/analysis/ { rewrite ^/agents/analysis(.*)$ $1 break; proxy_pass http://analysis_agent; }
    location /agents/report/ { rewrite ^/agents/report(.*)$ $1 break; proxy_pass http://report_agent; }
    location / { try_files $uri $uri/ /index.html; }
  }
}
